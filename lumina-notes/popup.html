<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Notes</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lumina</h1>
            <div style="display: flex; gap: 8px;">
                <button id="tab-notes-btn" class="tab-btn active" title="Notes">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
                <button id="tab-log-btn" class="tab-btn" title="Cookie Log">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </button>
                <button id="discord-btn" title="Send Note to Discord">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13"></path>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <button id="clear-btn" title="Clear Note">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Notes Tab -->
        <div id="tab-notes" class="tab-content active">
            <textarea id="note-input" placeholder="Jot down your thoughts here..." autofocus></textarea>
            <footer>
                <span id="status">Saved</span>
                <span id="char-count">0 chars</span>
            </footer>
        </div>

        <!-- Cookie Log Tab -->
        <div id="tab-log" class="tab-content">
            <div class="log-toolbar">
                <span class="log-title">🍪 Cookie Audit Log</span>
                <button id="clear-log-btn" title="Clear Log">Clear</button>
            </div>
            <div id="cookie-log-list" class="log-list">
                <p class="log-empty">No events recorded yet.<br>Browse a site to see activity.</p>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
